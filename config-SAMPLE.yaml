# RestoreSafe configuration file
# Place this file in the same directory as RestoreSafe.exe.

# Source folders to back up.
# Paths may be absolute or relative to RestoreSafe.exe.
# On Windows, prefer forward slashes in YAML paths (C:/Users/...) to avoid escape issues.
source_folders:
  - "C:/Users/Username/Documents"
  - "C:/Users/Username/Pictures"

# Destination folder for encrypted backup files.
# Path may be absolute or relative to RestoreSafe.exe.
target_folder: "C:/Backup"

# Maximum size of each split file (in MB).
# Default: 4096 MB (= 4 GB)
split_size_mb: 4096

# Retention: number of backup sets to keep per source folder.
# 0 = keep all backups (no automatic cleanup)
retention_keep: 0

# Log level: "info" (default) or "debug" (verbose output)
log_level: "info"

# Additional I/O diagnostics in debug log/console (write calls, average write size).
# Enable this only for storage or write-amplification troubleshooting.
io_diagnostics: false

# Authentication mode.
# 1 = Password only (default)
# 2 = Password AND YubiKey HMAC-SHA1 (2FA, ykchalresp must be installed)
# 3 = YubiKey only, no password (ykchalresp must be installed)
#
# In mode 3, physical possession of the YubiKey is the sole authentication
# factor. No password is prompted during backup or restore.
authentication_mode: 1